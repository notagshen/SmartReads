version: '3.8'

services:
  smartreads-web:
    image: ghcr.io/notagshen/smartreads:arm64-latest
    ports:
      - "9220:4173"
    environment:
      - NODE_ENV=production
      # Neon PostgreSQL 连接串（用于分享链接存储）
      # 例如: postgres://user:pass@ep-xxx.us-east-2.aws.neon.tech/dbname?sslmode=require
#      - NEON_DATABASE_URL=
    restart: unless-stopped
